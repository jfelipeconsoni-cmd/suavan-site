<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Fallback sem JavaScript: redireciona em 0s. -->
  <meta http-equiv="refresh" content="0; url=https://pais.suavan.com.br/">
  <link rel="canonical" href="https://pais.suavan.com.br/">
  <meta name="robots" content="noindex">
  <title>Sua Van</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFC400; color: #1a1a1a; text-align: center; padding: 24px;
    }
    a { color: #1a1a1a; font-weight: 700; }
  </style>
  <script>
    // Preserva query string e hash (ex.: campanhas com ?utm_...).
    var alvo = "https://pais.suavan.com.br/" + window.location.search + window.location.hash;
    window.location.replace(alvo);
  </script>
</head>
<body>
  <p>Redirecionando para <a href="https://pais.suavan.com.br/">pais.suavan.com.br</a>…</p>
</body>
</html>
